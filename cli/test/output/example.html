<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Example</title>
<style>
:root {
    --bg: #e2e3e3;
    --text: #021313;
    --text-muted: #2f72ec;
    --primary: #037878;
    --error: #ea6060;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: sans-serif;
    line-height: 1.6;
    padding: 20px;
}

br {
    height: 1rem;
}

p {
    color: var(--text);
    margin-bottom: 1.2rem;
}

strong {
    color: var(--primary);
    font-size: 1.2rem;
}

a {
    color: var(--text-muted);
    text-decoration: none;
}

a:hover {
    opacity: 0.8;
}
</style>
</head>
<body><main>
<p style="margin-left: 0rem"><strong>links</strong></p>
<p style="margin-left: 1rem"><a href="https://www.baidu.com">baidu</a></p>
<br>
<p style="margin-left: 1rem"><a href="https://www.bilibili.com">bilibili</a></p>
<p style="margin-left: 1rem">aaaa</p>
<p style="margin-left: 1rem"><a href="b">a</a></p>
<p style="margin-left: 1rem"><a href="d">c</a></p>
<p style="margin-left: 1rem"><a href="n">m</a></p>
<p style="margin-left: 1rem"><a href="l">l</a></p>
<p style="margin-left: 1rem"><a href="a">a</a></p>
</main></body>
</html>
