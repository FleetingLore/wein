<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Example</title>
    <style>
        :root {
            --bg: #141516;
            --text: #E6EDF0;
            --text-muted: #c4d9ff;
            --primary: #68c7c7;
            --error: #E67E7E;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            line-height: 1.6;
            padding: 20px;
        }

        br {
            height: 1rem;
        }

        p {
            color: var(--text);
            margin-bottom: 1.2rem;
        }

        strong {
            color: var(--primary);
            font-size: 1.2rem;
        }

        a {
            color: var(--text-muted);
            text-decoration: none;
        }

        a:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body><main>

    <p style="margin-left: 0rem"><strong>tests</strong></p>
    <p style="margin-left: 1rem"><a href="https://www.baidu.com">baidu</a></p>
    <p style="margin-left: 1rem">ok</p>
    <p style="margin-left: 1rem"><strong>二级领域</strong></p>
    <p style="margin-left: 2rem"><strong>三级领域</strong></p>
    <p style="margin-left: 3rem">aaa</p>
    <p style="margin-left: 3rem">67890</p>
    <p style="margin-left: 3rem"><strong>四级领域</strong></p>
    <p style="margin-left: 4rem">aaa</p>
</main></body>
</html>
