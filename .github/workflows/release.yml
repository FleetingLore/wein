name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            ext: .exe
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ''
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ''

    steps:
      - uses: actions/checkout@v2

      - name: Build
        run: |
          cd cli
          cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v2
        with:
          name: my-tool-${{ matrix.os }}
          path: cli/target/${{ matrix.target }}/release/my-tool${{ matrix.ext }}